<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lentera Perpustakaan Tata Boga</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(rgba(60,40,20,0.6), rgba(60,40,20,0.6)),
url("https://images.unsplash.com/photo-1495521821757-a1efb6729352") no-repeat center center fixed;
background-size:cover;
color:#4e342e;
}

/* LOGIN */
.login-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#3e2723;
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
width:300px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.login-box button{
margin-top:15px;
padding:10px;
width:100%;
background:#6d4c41;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* NAVBAR */
.navbar{
background:#6d4c41;
padding:15px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.navbar a{
color:white;
text-decoration:none;
padding:8px 18px;
background:#8d6e63;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.navbar a:hover{
background:#d7ccc8;
color:#4e342e;
}

/* SECTION */
.section{
display:none;
padding:60px 20px;
animation:fade 0.6s ease-in-out;
}

.active{display:block;}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.container{
max-width:1000px;
margin:auto;
background:rgba(255,248,240,0.95);
padding:50px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
position:relative;
}

.card button{
margin-top:10px;
background:#b71c1c;
}

/* FORM */
input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px;
background:#6d4c41;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
background:#6d4c41;
color:white;
}
</style>

<script>
let books = [
{title:"Resep Nusantara", desc:"Kumpulan resep tradisional Indonesia."},
{title:"Teknik Memasak Modern", desc:"Teknik plating & pengolahan profesional."},
{title:"Manajemen Dapur", desc:"Pengelolaan dapur & bisnis kuliner."}
];

function login(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";
renderBooks();
}else{
alert("Username atau Password salah!");
}
}

function showSection(id){
document.querySelectorAll('.section').forEach(sec=>{
sec.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}

function renderBooks(){
let container=document.getElementById("bookList");
container.innerHTML="";
books.forEach((book,index)=>{
container.innerHTML+=`
<div class="card">
<h3>${book.title}</h3>
<p>${book.desc}</p>
<button onclick="deleteBook(${index})">Hapus</button>
</div>
`;
});
}

function addBook(){
let title=document.getElementById("judulBuku").value;
let desc=document.getElementById("deskripsiBuku").value;

if(title===""||desc===""){
alert("Isi semua data!");
return;
}

books.push({title:title, desc:desc});
renderBooks();
document.getElementById("judulBuku").value="";
document.getElementById("deskripsiBuku").value="";
alert("Buku berhasil ditambahkan!");
}

function deleteBook(index){
books.splice(index,1);
renderBooks();
}
</script>

</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h2>Login Admin</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p style="margin-top:10px;font-size:12px;">User: admin | Pass: 1234</p>
</div>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none;">

<div class="navbar">
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('koleksi')">Koleksi</a>
<a onclick="showSection('admin')">Admin</a>
</div>

<!-- HOME -->
<div id="home" class="section active">
<div class="container">
<h2>🍰 Lentera Perpustakaan Tata Boga</h2>
<p>Perpustakaan digital untuk mendukung siswa menjadi chef profesional.</p>
</div>
</div>

<!-- KOLEKSI -->
<div id="koleksi" class="section">
<div class="container">
<h2>Koleksi Buku</h2>
<div class="grid" id="bookList"></div>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<div class="container">
<h2>Tambah Buku</h2>
<input type="text" id="judulBuku" placeholder="Judul Buku">
<textarea id="deskripsiBuku" placeholder="Deskripsi Buku"></textarea>
<button onclick="addBook()">Tambah Buku</button>
</div>
</div>

<div class="footer">
© 2026 Lentera Perpustakaan Tata Boga
</div>

</div>

</body>
</html>
