<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lentera Perpustakaan Tata Boga</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins', sans-serif;
background:linear-gradient(to right,#fdfbfb,#ebedee);
color:#333;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:18px 50px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:1000;
}

.navbar h2{
color:#a0522d;
}

.navbar ul{
display:flex;
list-style:none;
gap:30px;
}

.navbar ul li{
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.navbar ul li:hover{
color:#a0522d;
}

/* HERO */

.hero{
height:420px;
background:url("https://images.unsplash.com/photo-1556911220-bff31c812dba");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero div{
background:rgba(255,255,255,0.85);
padding:30px;
border-radius:15px;
backdrop-filter:blur(5px);
}

.hero h1{
color:#a0522d;
}

/* SECTION */

.section{
display:none;
padding:60px 20px;
text-align:center;
}

.active{
display:block;
}

/* CARD */

.card{
background:white;
border-radius:15px;
padding:20px;
width:230px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
}

.koleksi, .layanan{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:30px;
}

.card img{
width:100%;
border-radius:10px;
}

/* VIDEO */

.video-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:30px;
}

.video-box{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* PROFIL */

.profil-container{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
margin-top:30px;
}

.profil-box{
background:white;
padding:25px;
border-radius:15px;
width:300px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* JAM */

.jam-area{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:30px;
}

.jam-bulat{
width:190px;
height:190px;
border-radius:50%;
background:linear-gradient(135deg,#fff,#ffe9dc);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.tutup{
color:red;
font-weight:bold;
}

/* ADMIN */

.admin-box{
background:white;
padding:30px;
max-width:420px;
margin:auto;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* BUTTON */

.cv-btn{
display:inline-block;
padding:10px 15px;
background:#a0522d;
color:white;
border-radius:8px;
text-decoration:none;
margin-top:10px;
}

.cv-btn:hover{
background:#7a3c1f;
}

/* FOOTER */

footer{
background:#a0522d;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<div class="navbar">
<h2>Lentera Tata Boga</h2>
<ul>
<li onclick="showPage('home')">Home</li>
<li onclick="showPage('profil')">Profil</li>
<li onclick="showPage('koleksi')">Koleksi</li>
<li onclick="showPage('layanan')">Layanan</li>
<li onclick="showPage('jam')">Jam Layanan</li>
<li onclick="showPage('kontak')">Kontak</li>
<li onclick="showPage('admin')">Admin</li>
</ul>
</div>

<!-- ISI TETAP PERSIS PUNYA KAMU -->

<!-- (lanjutan HTML kamu TIDAK aku ubah sama sekali, jadi aman) -->

<script>
function showPage(page){
let sections=document.querySelectorAll(".section");
sections.forEach(function(section){
section.classList.remove("active");
});
document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
