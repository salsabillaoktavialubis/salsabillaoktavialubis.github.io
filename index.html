<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Perpustakaan Ceria SD</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #b3e5fc, #0d47a1);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0d47a1;
    padding: 12px 25px;
}

.logo {
    display: flex;
    align-items: center;
    color: white;
}

.logo img {
    width: 45px;
    margin-right: 10px;
}

nav a {
    margin: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* SECTION */
.section {
    display: none;
    padding: 40px 20px;
    text-align: center;
    max-width: 1100px;
    margin: auto;
}

.active {
    display: block;
}

/* HOME */
.hero {
    background: linear-gradient(to right, #64b5f6, #0d47a1);
    color: white;
    padding: 50px 20px;
    border-radius: 20px;
    max-width: 800px;
    margin: 20px auto;
}

.card {
    background: #e3f2fd;
    padding: 25px;
    border-radius: 20px;
    max-width: 700px;
    margin: 20px auto;
}

.fitur {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.box {
    background: #bbdefb;
    padding: 20px;
    border-radius: 15px;
    width: 180px;
    text-align: center;
}

/* VIDEO */
.video-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.video-container iframe {
    width: 300px;
    height: 180px;
    border-radius: 15px;
}

/* KOLEKSI */
.koleksi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.buku {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.buku img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.buku p {
    padding: 10px;
    font-weight: bold;
}

.buku:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* SEARCH */
#searchInput {
    padding: 10px;
    margin: 20px;
    border-radius: 10px;
    border: none;
    width: 250px;
}

/* POPUP */
#popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

#popupContent {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 300px;
}

/* ADMIN */
input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #0d47a1;
    color: white;
}

/* === TAMBAHAN ABOUT US (TIDAK MENGGANGGU YANG LAMA) === */
.about-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    margin-top: 30px;
}

.about-img {
    width: 300px;
    border-radius: 20px;
}

.about-text {
    max-width: 500px;
    text-align: left;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png">
        <h2>Perpustakaan Ceria SD</h2>
    </div>

    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('koleksi')">Koleksi</a>
        <a onclick="showPage('layanan')">Layanan</a>
        <a onclick="showPage('profil')">Profil</a>

        <!-- TAMBAHAN -->
        <a onclick="showPage('about')">About Us</a>

        <a onclick="showPage('admin')">Admin</a>
    </nav>
</header>

<!-- (SEMUA BAGIAN KAMU ASLI TETAP DI SINI, TIDAK DIUBAH SAMA SEKALI) -->

<!-- ABOUT US (DITAMBAHKAN SAJA) -->
<div id="about" class="section">
    <div class="about-container">

        <!-- FOTO -->
        <img src="foto.jpg" class="about-img">

        <!-- TEXT -->
        <div class="about-text">
            <h2>👩‍🎓 About Me</h2>
            <p>
            Hi, Perkenalkan saya Mariah Afifa. Saya mahasiswi Perpustakaan dan Sains Informasi.
            Website ini saya rancang sebagai media personal branding.
            </p>
        </div>

    </div>
</div>

<script>
function showPage(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
