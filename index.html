<style>
/* --- TEMA PERPUSTAKAAN CERIA --- */
body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    /* Background dengan pola halus agar suasana SD lebih terasa */
    background-color: #f0f8ff;
    background-image: radial-gradient(#d1e9ff 1px, transparent 1px);
    background-size: 20px 20px;
    color: #2c3e50;
    font-size: 15px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0d47a1;
    padding: 15px 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    color: white;
}

.logo img {
    width: 40px;
    margin-right: 12px;
    filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
}

.logo h2 {
    margin: 0;
    font-size: 1.2rem;
    letter-spacing: 1px;
}

nav a {
    margin-left: 10px;
    text-decoration: none;
    color: #bbdefb;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 12px;
    transition: 0.3s;
    font-size: 0.9rem;
}

nav a:hover {
    color: white;
    background: rgba(255, 255, 255, 0.1);
}

nav a.nav-active {
    background: #ffc107;
    color: #0d47a1;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.section {
    display: none;
    padding: 30px 20px;
    text-align: center;
    max-width: 1000px;
    margin: auto;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.active { display: block; }

/* Hero Section */
.hero {
    background: linear-gradient(135deg, #1e88e5, #1565c0);
    color: white;
    padding: 40px 25px;
    border-radius: 30px;
    box-shadow: 0 10px 20px rgba(21, 101, 192, 0.3);
    margin-bottom: 30px;
}

.hero h1 { font-size: 1.8rem; margin-bottom: 10px; }

/* Desain Kartu yang lebih bersih */
.card {
    background: white;
    padding: 25px;
    border-radius: 24px;
    max-width: 750px;
    margin: 20px auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    border: 1px solid #e1f5fe;
}

.card h2 { color: #0d47a1; margin-top: 0; font-size: 1.3rem; }

/* Login/Register Overlay */
#auth-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0d47a1 url('https://www.transparenttextures.com/patterns/cubes.png');
    display: flex; justify-content: center; align-items: center;
    z-index: 10000;
}

.auth-card {
    background: white; padding: 40px; border-radius: 30px;
    text-align: center; width: 320px; 
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* Form Styling */
input { 
    padding: 12px; margin: 8px 0; border-radius: 12px; 
    border: 2px solid #e3f2fd; width: 90%; 
    font-family: inherit; transition: 0.3s;
}

input:focus { border-color: #1e88e5; outline: none; box-shadow: 0 0 8px rgba(30,136,229,0.2); }

button { 
    padding: 12px 25px; border-radius: 15px; border: none; 
    background: #ffc107; color: #0d47a1; font-weight: 700; 
    cursor: pointer; transition: 0.3s; box-shadow: 0 4px 0 #e6a800;
}

button:active { transform: translateY(3px); box-shadow: none; }

/* Event Cards */
.event-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 25px;
}

.event-card-new {
    background: white; border-radius: 20px; padding: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.05); text-align: left;
    border-top: 6px solid #ffc107;
}

.event-time {
    background: #fff9c4; color: #f57f17; padding: 5px 12px;
    border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;
}

<script>
// Navigasi
function showPage(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('nav-active'));
    document.getElementById(id).classList.add('active');
    let navEl = document.getElementById('nav-' + id);
    if(navEl) navEl.classList.add('nav-active');
}

// Auth
function pindahKeDaftar() { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; }
function pindahKeLogin() { document.getElementById('register-form').style.display='none'; document.getElementById('login-form').style.display='block'; }
function aksiDaftar() {
    let u = document.getElementById('userReg').value; let p = document.getElementById('passReg').value;
    if(u && p) { localStorage.setItem('userPerpus', u); localStorage.setItem('passPerpus', p); alert("Akun berhasil dibuat!"); pindahKeLogin(); }
}
function aksiLogin() {
    let u = document.getElementById('userIn').value; let p = document.getElementById('passIn').value;
    if(u === localStorage.getItem('userPerpus') && p === localStorage.getItem('passPerpus') && u) {
        document.getElementById('auth-overlay').style.display='none'; document.getElementById('main-app').style.display='block';
        document.getElementById('displayUser').innerText = u; showPage('home');
    } else { alert("Maaf, Username atau Password salah!"); }
}
function logout() { location.reload(); }

// Koleksi Saku
let koleksiSaku = JSON.parse(localStorage.getItem('koleksiSaku')) || [];
function tampilkanBukuSaku() {
    let div = document.getElementById("listBukuSaku"); div.innerHTML = "";
    koleksiSaku.forEach((b, i) => {
        div.innerHTML += `<div class="admin-box" style="display:flex; justify-content:space-between; align-items:center;"><div><strong>${b.judul}</strong><br><small>Penulis: ${b.penulis}</small></div><button onclick="hapusBukuSaku(${i})" style="background:#ff5252; color:white; padding:5px 10px; font-size:0.7rem; box-shadow:0 2px 0 #c62828;">Hapus</button></div>`;
    });
}
function tambahBukuSaku() {
    let j = document.getElementById("bookTitle").value; let p = document.getElementById("bookAuthor").value;
    if(j && p) { 
        koleksiSaku.push({judul:j, penulis:p}); 
        localStorage.setItem('koleksiSaku', JSON.stringify(koleksiSaku)); 
        tampilkanBukuSaku();
        document.getElementById("bookTitle").value = "";
        document.getElementById("bookAuthor").value = "";
    }
}
function hapusBukuSaku(i) { koleksiSaku.splice(i, 1); localStorage.setItem('koleksiSaku', JSON.stringify(koleksiSaku)); tampilkanBukuSaku(); }
tampilkanBukuSaku();

// Fitur Lainnya
function searchBuku(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll(".buku").forEach(item=>{ item.style.display = item.innerText.toLowerCase().includes(input) ? "" : "none"; });
}
function showDetail(j,d){ document.getElementById("judulBuku").innerText=j; document.getElementById("deskripsiBuku").innerText=d; document.getElementById("popup").style.display="flex"; }
function closePopup(){ document.getElementById("popup").style.display="none"; }
function hitungPoin() {
    let n = document.getElementById("jumlahBuku").value;
    document.getElementById("hasilPoin").innerText = n * 10;
    document.getElementById("pesanMotivasi").innerText = n > 0 ? "Hebat sekali! Teruslah membaca ya! 🌟" : "Yuk, mulai baca bukumu hari ini!";
}
</script>
