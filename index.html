<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perpustakaan Tata Boga Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
background:linear-gradient(rgba(60,40,20,0.6),rgba(60,40,20,0.6)),
url("https://images.unsplash.com/photo-1495521821757-a1efb6729352") no-repeat center center fixed;
background-size:cover;
color:#4e342e;
}

/* NAVBAR */
.navbar{
background:#6d4c41;
padding:15px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.navbar button{
background:#8d6e63;
color:white;
border:none;
padding:8px 20px;
border-radius:25px;
cursor:pointer;
transition:0.3s;
}

.navbar button:hover{
background:#d7ccc8;
color:#4e342e;
}

/* SECTION */
.section{
display:none;
padding:60px 20px;
animation:fade 0.5s ease-in-out;
}

.active{display:block;}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.container{
max-width:900px;
margin:auto;
background:rgba(255,248,240,0.95);
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button.submit{
margin-top:20px;
width:100%;
padding:12px;
background:#6d4c41;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button.submit:hover{background:#8d6e63;}

.table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

.table th,.table td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

.footer{
text-align:center;
padding:15px;
background:#6d4c41;
color:white;
margin-top:30px;
}
</style>
</head>
<body>

<div class="navbar">
<button onclick="show('home')">Home</button>
<button onclick="show('daftar')">Daftar</button>
<button onclick="show('admin')" id="adminBtn" style="display:none;">Admin</button>
<button onclick="show('login')" id="loginBtn">Login</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
<div class="container">
<h2>🍰 Perpustakaan Tata Boga</h2>
<p>Perpustakaan bidang kuliner yang mendukung pembelajaran resep, teknik memasak, dan manajemen usaha boga.</p>
</div>
</div>

<!-- DAFTAR -->
<div id="daftar" class="section">
<div class="container">
<h2>Form Pendaftaran Anggota</h2>
<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="text" id="kelas" placeholder="Kelas">
<input type="email" id="email" placeholder="Email">
<button class="submit" onclick="daftar()">Daftar</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<div class="container">
<h2>Login Admin</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="submit" onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<div class="container">
<h2>Dashboard Admin</h2>
<table class="table">
<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Email</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>
</div>
</div>

<div class="footer">© 2026 Perpustakaan Tata Boga Premium</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function daftar(){
let nama=document.getElementById('nama').value;
let kelas=document.getElementById('kelas').value;
let email=document.getElementById('email').value;

if(nama && kelas && email){
let data=JSON.parse(localStorage.getItem('anggota'))||[];
data.push({nama,kelas,email});
localStorage.setItem('anggota',JSON.stringify(data));
alert("Pendaftaran berhasil!");
document.getElementById('nama').value="";
document.getElementById('kelas').value="";
document.getElementById('email').value="";
}
}

function login(){
let user=document.getElementById('username').value;
let pass=document.getElementById('password').value;

if(user==="admin" && pass==="1234"){
alert("Login berhasil!");
document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";
document.getElementById("adminBtn").style.display="inline-block";
show("admin");
loadData();
}else{
alert("Username atau password salah!");
}
}

function logout(){
alert("Logout berhasil");
document.getElementById("loginBtn").style.display="inline-block";
document.getElementById("logoutBtn").style.display="none";
document.getElementById("adminBtn").style.display="none";
show("home");
}

function loadData(){
let data=JSON.parse(localStorage.getItem('anggota'))||[];
let table=document.getElementById("dataTable");
table.innerHTML="";
data.forEach(item=>{
table.innerHTML+=`<tr>
<td>${item.nama}</td>
<td>${item.kelas}</td>
<td>${item.email}</td>
</tr>`;
});
}
</script>

</body>
</html>
