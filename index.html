<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title> Lentera Perpustakaan Tata Boga</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#fdf6ec;
}

/* BACKGROUND HOME */
.home-bg{
    background:linear-gradient(rgba(253,246,236,0.9),
              rgba(253,246,236,0.9)),
              url('https://images.unsplash.com/photo-1556911220-bff31c812dba');
    background-size:cover;
    background-position:center;
}

/* LOGIN */
.login-page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2f4f6f;
}

.login-container{
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

.login-container input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

.login-container button{
    padding:10px;
    width:100%;
    background:#2f4f6f;
    color:white;
    border:none;
    border-radius:8px;
}

/* NAVBAR */
.navbar{
    background:#2f4f6f;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.logo img{
    width:40px;
}

.navbar a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    cursor:pointer;
}

/* SECTION */
.section{
    padding:60px;
    text-align:center;
    animation:fade 0.5s ease-in-out;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

/* KOLEKSI */
.koleksi-container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-top:30px;
}

.koleksi{
    background:white;
    padding:20px;
    width:200px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    transition:0.8s;
}

.koleksi:hover{
    transform:rotateY(360deg);
}

/* ABOUT */
.about-container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.about-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    margin-top:30px;
}

.about-card{
    background:#fdf6ec;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:left;
}

.about-card h3{
    color:#2f4f6f;
}

/* JAM DIGITAL */
.jam-box{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.status-buka{
    margin-top:10px;
    font-weight:bold;
}

/* FOOTER */
.footer{
    background:#2f4f6f;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>

<script>
function showPage(page){
    const pages = ["home","about","koleksiPage","layananPage","profilPage","adminPage"];
    pages.forEach(function(p){
        document.getElementById(p).style.display="none";
    });
    document.getElementById(page).style.display="block";
}

function login(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("mainPage").style.display="block";
}

/* JAM DIGITAL */
function updateJam(){
    const now = new Date();
    const jam = now.getHours();
    const menit = now.getMinutes();
    const detik = now.getSeconds();
    const hari = now.getDay();

    const waktu =
        (jam<10?"0":"")+jam + ":" +
        (menit<10?"0":"")+menit + ":" +
        (detik<10?"0":"")+detik;

    document.getElementById("jamDigital").innerHTML = waktu;

    let status = "";

    if(jam >= 8 && jam < 15 && hari >=1 && hari <=5){
        status = "Perpustakaan Sedang BUKA";
        document.getElementById("statusBuka").style.color="green";
    } else if(jam >=8 && jam <12 && hari == 6){
        status = "Perpustakaan Sedang BUKA";
        document.getElementById("statusBuka").style.color="green";
    } else {
        status = "Perpustakaan Sedang TUTUP";
        document.getElementById("statusBuka").style.color="red";
    }

    document.getElementById("statusBuka").innerHTML = status;
}

setInterval(updateJam,1000);
</script>

</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
    <div class="login-container">
        <h2>Login Perpustakaan</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none;">

    <div class="navbar">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            Lentera Perpustakaan Tata Boga
        </div>
        <div>
            <a onclick="showPage('home')">Home</a>
            <a onclick="showPage('koleksiPage')">Koleksi</a>
            <a onclick="showPage('layananPage')">Layanan</a>
            <a onclick="showPage('profilPage')">Profil</a>
            <a onclick="showPage('adminPage')">Admin</a>
            <a onclick="showPage('about')">About Us</a>
        </div>
    </div>

    <!-- LAYANAN + JAM -->
    <div id="layananPage" class="section" style="display:none;">
        <h2>Jam Kunjungan Perpustakaan</h2>

        <div class="about-container">

            <div class="about-card">
                <h3>Senin - Jumat</h3>
                <p>08.00 WIB - 15.00 WIB</p>
            </div>

            <div class="about-card">
                <h3>Sabtu</h3>
                <p>08.00 WIB - 12.00 WIB</p>
            </div>

            <div class="about-card">
                <h3>Minggu & Libur Nasional</h3>
                <p>Tutup</p>
            </div>

            <div class="about-card">
                <h3>Jam Sekarang</h3>
                <div id="jamDigital" class="jam-box"></div>
                <div id="statusBuka" class="status-buka"></div>
            </div>

        </div>
    </div>

    <div class="footer">
        © 2026 Lentera Perpustakaan Tata Boga
    </div>

</div>

</body>
</html>
