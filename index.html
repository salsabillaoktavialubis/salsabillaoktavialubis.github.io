<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Perpustakaan Tata Boga</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#fdfdfd;padding-top:90px}
header{background:#8B0000;padding:15px 50px;color:white;display:flex;justify-content:space-between;position:fixed;width:100%;top:0;z-index:1000}
nav a{color:white;margin-left:20px;text-decoration:none}
.section{padding:80px 50px}
h2{text-align:center;margin-bottom:20px}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{width:250px;padding:15px;background:white;box-shadow:0 5px 15px rgba(0,0,0,0.1);border-radius:10px;text-align:center}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}
input{padding:8px;margin:5px}
button{padding:8px 12px;background:#8B0000;color:white;border:none;cursor:pointer}
#search{display:block;margin:0 auto 20px auto;width:300px}
</style>
</head>

<body>

<header>
<h1>Perpustakaan Tata Boga</h1>
<nav>
<a href="#about">Tentang</a>
<a href="#koleksi">Koleksi</a>
<a href="#kontak">Kontak</a>
<a href="#" onclick="login()">Login</a>
</nav>
</header>

<section class="section" id="about">
<h2>Tentang Kami</h2>
<p style="text-align:center">Perpustakaan Tata Boga menyediakan berbagai koleksi kuliner modern dan tradisional.</p>
</section>

<section class="section" id="koleksi">
<h2>Koleksi Buku</h2>

<input type="text" id="search" placeholder="Cari buku..." onkeyup="cariBuku()">

<div id="adminPanel" style="display:none;text-align:center">
<input type="text" id="judul" placeholder="Judul Buku">
<input type="text" id="kategori" placeholder="Kategori">
<input type="text" id="gambar" placeholder="URL Gambar">
<button onclick="tambahBuku()">Tambah</button>
</div>

<div class="cards" id="listBuku"></div>
</section>

<section class="section" id="kontak">
<h2>Kontak</h2>
<p style="text-align:center">Email: perpustakaan@tataboga.com</p>
</section>

<script>
function login(){
let user=prompt("Username:");
let pass=prompt("Password:");
if(user==="admin"&&pass==="123"){
document.getElementById("adminPanel").style.display="block";
alert("Login berhasil");
}else alert("Salah");
}

let buku=JSON.parse(localStorage.getItem("buku"))||[];

function tampilkanBuku(data=buku){
let list=document.getElementById("listBuku");
list.innerHTML="";

data.forEach((b,i)=>{
list.innerHTML+=`
<div class="card">
<img src="${b.gambar||'https://via.placeholder.com/250'}">
<h3>${b.judul}</h3>
<p>${b.kategori}</p>
<button onclick="hapus(${i})">Hapus</button>
</div>`;
});
}

function tambahBuku(){
let judul=document.getElementById("judul").value;
let kategori=document.getElementById("kategori").value;
let gambar=document.getElementById("gambar").value;

if(!judul||!kategori)return alert("Isi dulu");

buku.push({judul,kategori,gambar});
localStorage.setItem("buku",JSON.stringify(buku));
tampilkanBuku();
}

function hapus(i){
buku.splice(i,1);
localStorage.setItem("buku",JSON.stringify(buku));
tampilkanBuku();
}

function cariBuku(){
let keyword=document.getElementById("search").value.toLowerCase();
let hasil=buku.filter(b=>b.judul.toLowerCase().includes(keyword));
tampilkanBuku(hasil);
}

tampilkanBuku();
</script>

</body>
</html>
